image: Visual Studio 2022

environment:
  nodejs_version: "20"
  npm_config_cache: C:\npm-cache

install:
  - ps: Install-Product node $env:nodejs_version
  - npm install -g npm@6
  - npm ci

build_script:
  - npm run dist --if-present
  - npm run build --if-present

artifacts:
  - path: release\*.exe
    name: RouterX-Admin-Windows
  - path: release\*.nupkg
    name: RouterX-Admin-Package

deploy:
  - provider: GitHub
    release: $(APPVEYOR_REPO_TAG_NAME)
    description: "RouterX Admin Windows Build"
    auth_token: "%GITHUB_TOKEN%"
    artifact: RouterX-Admin-Windows
    on:
      branch: main
      appveyor_repo_tag: true

on_failure:
  - ps: Get-ChildItem . -Recurse -Filter "*.log" | Select -Expand FullName | ForEach-Object { Get-Content $_ | Select -Last 10 }
