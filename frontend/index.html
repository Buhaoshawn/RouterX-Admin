<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RouterX Admin</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.prod.js"></script>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root, [data-theme="dark"] {
  --bg: #0D0E11;
  --bg-card: #18181B;
  --bg-sidebar: #0D0E11;
  --bg-sidebar-hover: #1F2029;
  --bg-sidebar-active: #6366F1;
  --bg-card-hover: #1F2029;
  --bg-input: #1F2029;
  --border: #27272A;
  --text-primary: #FAFAFA;
  --text-secondary: #A1A1AA;
  --text-sidebar: #71717A;
  --text-sidebar-active: #FAFAFA;
  --accent: #6366F1;
  --accent-hover: #4F46E5;
  --accent-light: rgba(99,102,241,.15);
  --danger: #EF4444;
  --success: #22C55E;
  --warning: #F59E0B;
  --shadow: 0 1px 3px rgba(0,0,0,.4);
  --radius: 14px;
  --radius-sm: 8px;
  --titlebar-bg: #0D0E11;
  --titlebar-text: #FAFAFA;
  --scrollbar: #3F3F46;
  color-scheme: dark;
}
[data-theme="light"] {
  --bg: #FAFAF8;
  --bg-card: #FFFFFF;
  --bg-sidebar: #F4F1EC;
  --bg-sidebar-hover: #EDE9E1;
  --bg-sidebar-active: #6366F1;
  --bg-card-hover: #F9F7F4;
  --bg-input: #F4F1EC;
  --border: #E8E4DF;
  --text-primary: #1C1917;
  --text-secondary: #78716C;
  --text-sidebar: #A8A29E;
  --text-sidebar-active: #FFFFFF;
  --accent: #6366F1;
  --accent-hover: #4F46E5;
  --accent-light: rgba(99,102,241,.1);
  --danger: #EF4444;
  --success: #22C55E;
  --warning: #F59E0B;
  --shadow: 0 1px 3px rgba(0,0,0,.08);
  --radius: 14px;
  --radius-sm: 8px;
  --titlebar-bg: #F4F1EC;
  --titlebar-text: #1C1917;
  --scrollbar: #D6D3D1;
  color-scheme: light;
}

body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text-primary); height: 100vh; overflow: hidden; transition: background .2s, color .2s; }
.app-shell { display: flex; flex-direction: column; height: 100vh; }

.titlebar { height: 38px; background: var(--titlebar-bg); display: flex; align-items: center; justify-content: space-between; padding: 0 12px 0 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; transition: background .2s, border-color .2s; }
.titlebar-left { display: flex; align-items: center; gap: 10px; }
.titlebar-logo { width: 22px; height: 22px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; }
.titlebar-title { font-size: 13px; font-weight: 600; color: var(--titlebar-text); }
.titlebar-controls { display: flex; align-items: center; gap: 4px; }
.tb-btn { width: 32px; height: 26px; border: none; background: transparent; color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 6px; transition: background .15s, color .15s; }
.tb-btn svg { width: 13px; height: 13px; }
.tb-btn:hover { background: var(--bg-sidebar-hover); color: var(--text-primary); }
.tb-btn.close:hover { background: var(--danger); color: #fff; }
.theme-toggle { width: 32px; height: 26px; border: none; background: transparent; color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 6px; transition: background .15s, color .15s; }
.theme-toggle svg { width: 14px; height: 14px; }
.theme-toggle:hover { background: var(--bg-sidebar-hover); color: var(--text-primary); }

.app-layout { display: flex; flex: 1; overflow: hidden; }

.sidebar { width: 68px; background: var(--bg-sidebar); display: flex; flex-direction: column; align-items: center; padding: 12px 0; gap: 3px; flex-shrink: 0; border-right: 1px solid var(--border); transition: background .2s, border-color .2s; }
.nav-item { width: 50px; height: 50px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; border-radius: var(--radius-sm); color: var(--text-sidebar); cursor: pointer; transition: all .15s; }
.nav-item:hover { background: var(--bg-sidebar-hover); color: var(--text-primary); }
.nav-item.active { background: var(--accent); color: var(--text-sidebar-active); box-shadow: 0 2px 8px rgba(99,102,241,.35); }
.nav-item svg { width: 20px; height: 20px; }
.nav-item span { font-size: 8.5px; font-weight: 600; letter-spacing: .2px; }

.nav-user { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px 6px; margin-top: auto; border-top: 1px solid var(--border); width: 100%; }
.user-avatar { width: 28px; height: 28px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; }
.user-name { font-size: 8px; color: var(--text-secondary); text-align: center; max-width: 50px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.main-content { flex: 1; overflow-y: auto; padding: 24px 28px; background: var(--bg); transition: background .2s; }
.main-content::-webkit-scrollbar { width: 5px; }
.main-content::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 10px; }

.page-title { font-size: 20px; font-weight: 700; color: var(--text-primary); margin-bottom: 20px; letter-spacing: -.3px; }
.toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; gap: 12px; flex-wrap: wrap; }
.toolbar-left { display: flex; gap: 8px; align-items: center; }

.search-input, .form-input, .form-select { padding: 8px 12px; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-size: 13px; font-family: inherit; outline: none; transition: border-color .15s; }
.search-input:focus, .form-input:focus, .form-select:focus { border-color: var(--accent); }
.search-input { min-width: 220px; }
.form-select { cursor: pointer; }

.btn { padding: 8px 16px; border: none; border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; font-weight: 600; font-family: inherit; transition: all .15s; display: inline-flex; align-items: center; gap: 6px; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); box-shadow: 0 2px 8px rgba(99,102,241,.3); }
.btn-secondary { background: var(--bg-input); color: var(--text-primary); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--bg-sidebar-hover); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { opacity: .9; }
.btn-sm { padding: 6px 12px; font-size: 12px; }

.data-table { width: 100%; border-collapse: collapse; background: var(--bg-card); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); border: 1px solid var(--border); }
.data-table th, .data-table td { padding: 11px 14px; text-align: left; font-size: 13px; }
.data-table th { background: var(--bg-sidebar); color: var(--text-secondary); font-weight: 600; font-size: 12px; border-bottom: 1px solid var(--border); }
.data-table tr:not(:last-child) td { border-bottom: 1px solid var(--border); }
.data-table tr:hover td { background: var(--bg-card-hover); }

.badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; display: inline-block; }
.badge.active, .badge.free { background: rgba(34,197,94,.15); color: #22C55E; }
.badge.disabled, .badge.pro_monthly { background: var(--accent-light); color: var(--accent); }
.badge.pro_yearly { background: rgba(245,158,11,.15); color: #F59E0B; }
.badge.super_admin { background: rgba(239,68,68,.15); color: #EF4444; }
.badge.user_manager { background: rgba(161,161,170,.1); color: var(--text-secondary); }

.pagination { display: flex; gap: 4px; margin-top: 16px; justify-content: center; }
.page-btn { min-width: 32px; height: 32px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-secondary); border-radius: var(--radius-sm); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 13px; transition: all .15s; }
.page-btn:hover { background: var(--bg-sidebar-hover); color: var(--text-primary); }
.page-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.page-btn:disabled { opacity: .4; cursor: not-allowed; }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
.modal { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; min-width: 420px; max-width: 90vw; box-shadow: 0 8px 32px rgba(0,0,0,.3); }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.modal-title { font-size: 15px; font-weight: 700; color: var(--text-primary); }
.modal-close { width: 28px; height: 28px; border: none; background: transparent; color: var(--text-secondary); cursor: pointer; font-size: 18px; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
.modal-close:hover { background: var(--bg-sidebar-hover); color: var(--text-primary); }
.form-group { margin-bottom: 14px; }
.form-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }

.empty { text-align: center; padding: 48px; color: var(--text-secondary); font-size: 14px; }

.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 24px; }
.stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; box-shadow: var(--shadow); transition: background .2s, border-color .2s; }
.stat-label { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
.stat-value { font-size: 26px; font-weight: 700; color: var(--text-primary); letter-spacing: -.5px; }
.stat-sub { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }

</style>
</head>
<body>
<div id="app"></div>

<script>
const { createApp, ref, computed, onMounted, watch } = Vue
const { createRouter, createWebHashHistory } = VueRouter

const API = '/api'

// Admin API 请求自动附加 token
function adminFetch(url, opts = {}) {
  const token = localStorage.getItem('admin_token')
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) }
  if (token) headers['Authorization'] = 'Bearer ' + token
  // 支持 params: { page: 1 } → ?page=1
  if (opts.params) {
    const qs = new URLSearchParams(opts.params).toString()
    url = url + (url.includes('?') ? '&' : '?') + qs
  }
  return fetch(url, { ...opts, headers })
}



// ====== AdminLogin ======
const AdminLogin = {
  template: `
    <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0f172a">
      <div style="background:#1e293b;border:1px solid #334155;border-radius:16px;padding:40px;width:380px">
        <div style="width:48px;height:48px;background:#f59e0b;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;margin:0 auto 16px">A</div>
        <h1 style="font-size:20px;font-weight:700;color:#f1f5f9;text-align:center;margin:0 0 28px">RouterX Admin</h1>
        <div style="display:flex;flex-direction:column;gap:16px">
          <div>
            <div style="font-size:12px;font-weight:600;color:#94a3b8;margin-bottom:6px">用户名</div>
            <input v-model="username" @keyup.enter="doLogin" placeholder="管理员用户名" style="width:100%;padding:10px 14px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#f1f5f9;font-size:14px;outline:none;box-sizing:border-box" />
          </div>
          <div>
            <div style="font-size:12px;font-weight:600;color:#94a3b8;margin-bottom:6px">密码</div>
            <input v-model="password" type="password" @keyup.enter="doLogin" placeholder="密码" style="width:100%;padding:10px 14px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#f1f5f9;font-size:14px;outline:none;box-sizing:border-box" />
          </div>
          <div v-if="error" style="background:#fee2e2;color:#dc2626;padding:10px 14px;border-radius:8px;font-size:13px">{{ error }}</div>
          <button @click="doLogin" :disabled="loading" style="padding:11px;background:#f59e0b;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer">{{ loading ? '登录中...' : '登录' }}</button>
        </div>
      </div>
    </div>
  `,
  setup() {
    const username = ref('')
    const password = ref('')
    const error = ref('')
    const loading = ref(false)
    const router = useRouter()

    function doLogin() {
      if (!username.value || !password.value) { error.value = '请输入用户名和密码'; return }
      error.value = ''
      loading.value = true
      fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: username.value, password: password.value })
      }).then(r => r.json()).then(d => {
        if (d.code === 200) {
          if (d.data.user.is_admin !== 1) {
            error.value = '非管理员账号无权登录'
            loading.value = false
            return
          }
          localStorage.setItem('admin_token', d.data.token)
          localStorage.setItem('admin_user', JSON.stringify(d.data.user))
          router.push('/dashboard')
        } else {
          error.value = d.msg || '登录失败'
        }
        loading.value = false
      }).catch(e => { error.value = '网络错误'; loading.value = false })
    }

    return { username, password, error, loading, doLogin }
  }
}

// ====== 路由 ======
const routes = [
  { path: '/', redirect: '/dashboard' },
  { path: '/login', component: AdminLogin },
  { path: '/dashboard', component: Dashboard, meta: { requiresAdmin: true } },
  { path: '/users', component: Users, meta: { requiresAdmin: true } },
  { path: '/orders', component: Orders, meta: { requiresAdmin: true } },
  { path: '/subscriptions', component: Subscriptions, meta: { requiresAdmin: true } },
  { path: '/settings', component: Settings, meta: { requiresAdmin: true } },
]

const router = createRouter({
  history: createWebHashHistory(),
  routes
})

// ====== App ======
const App = {
  template: `
    <div class="app-shell">
      <header class="titlebar">
        <div class="titlebar-left">
          <div class="titlebar-logo">A</div>
          <div>
            <div class="titlebar-title">RouterX Admin</div>
            <div style="font-size:11px;color:#64748b">{{ adminUsername }}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <button @click="adminLogout" style="background:rgba(255,255,255,.1);border:1px solid #334155;color:#94a3b8;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:12px">退出</button>
        </div>
        <div class="titlebar-controls">
          <button class="tb-btn" @click="minimize" title="最小化"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
          <button class="tb-btn" @click="maximize" title="最大化"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="5" width="14" height="14" rx="1"/></svg></button>
          <button class="tb-btn close" @click="close" title="关闭"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="6" y1="6" x2="18" y2="18"/><line x1="6" y1="18" x2="18" y2="6"/></svg></button>
        </div>
      </header>
      <div class="layout">
        <nav class="sidebar">
          <div class="sidebar-nav">
            <router-link to="/dashboard" class="nav-item" active-class="active">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
              总览
            </router-link>
            <router-link to="/users" class="nav-item" active-class="active">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
              用户管理
            </router-link>
            <router-link to="/orders" class="nav-item" active-class="active">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
              订单管理
            </router-link>
            <router-link to="/subscriptions" class="nav-item" active-class="active">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12V22H4V12"/><path d="M22 7H2v5h20V7z"/><path d="M12 22V7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>
              订阅计划
            </router-link>
          </div>
          <div class="sidebar-nav">
            <div class="nav-section">系统</div>
            <router-link to="/settings" class="nav-item" active-class="active">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
              系统设置
            </router-link>
          </div>
        </nav>
        <main class="main">
          <router-view />
        </main>
      </div>
    </div>
  `,
  setup() {
    function minimize() { window.electronAPI?.windowMinimize?.() }
    function maximize() { window.electronAPI?.windowMaximize?.() }
    function close() { window.electronAPI?.windowClose?.() }
    function adminLogout() {
      localStorage.removeItem('admin_token')
      localStorage.removeItem('admin_user')
      window.location.hash = '/login'
    }
    const adminRole = computed(() => { const u = JSON.parse(localStorage.getItem('admin_user') || '{}'); return u.role || 'user_manager' })
    const adminUsername = computed(() => {
      const u = JSON.parse(localStorage.getItem('admin_user') || '{}')
      return u.username || ''
    })
    return { minimize, maximize, close, adminLogout, adminUsername, adminRole }
  }
}


// ====== Dashboard ======
const Dashboard = {
  template: `
    <div>
      <div class="page-title"><span></span>总览</div>
      <div class="stats-grid" v-if="stats">
        <div class="stat-card">
          <div class="stat-label">总用户数</div>
          <div class="stat-value">{{ stats.total_users }}</div>
          <div class="stat-change">注册用户总数</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">活跃订阅</div>
          <div class="stat-value green">{{ stats.active_subscriptions }}</div>
          <div class="stat-change">当前有效订阅</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">总收入</div>
          <div class="stat-value yellow">¥{{ stats.total_revenue_cny }}</div>
          <div class="stat-change">已支付订单总额</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">待处理订单</div>
          <div class="stat-value" :class="stats.pending_orders > 0 ? 'red' : ''">{{ stats.pending_orders }}</div>
          <div class="stat-change">等待支付</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">总订单数</div>
          <div class="stat-value">{{ stats.total_orders }}</div>
          <div class="stat-change">所有订单记录</div>
        </div>
      </div>
      <div v-if="loading" class="loading">加载中...</div>
    </div>
  `,
  setup() {
    const stats = ref(null)
    const loading = ref(true)
    onMounted(async () => {
      try {
        const res = await adminFetch(API + '/admin/stats')
        if (res.data.code === 200) stats.value = res.data.data
      } catch(e) { console.error(e) }
      finally { loading.value = false }
    })
    return { stats, loading }
  }
}

// ====== Users ======
const Users = {
  template: `
    <div>
      <div class="page-title"><span></span>用户管理</div>
      <div class="toolbar">
        <div class="toolbar-left">
          <input class="search-input" v-model="search" placeholder="搜索用户ID/名称..." @input="doSearch" />
          <select class="form-select" v-model="filterStatus" @change="loadUsers" style="width:120px">
            <option value="">全部状态</option>
            <option value="active">正常</option>
            <option value="disabled">禁用</option>
          </select>
        </div>
        <button class="btn btn-primary btn-sm" @click="loadUsers">🔄 刷新</button>
        <button class="btn btn-primary btn-sm" @click="showCreateModal=true" v-if="adminRole === 'super_admin'">+ 添加管理员</button>
      </div>

      <!-- 创建管理员弹窗 -->
      <div class="modal-overlay" v-if="showCreateModal" @click.self="showCreateModal=false">
        <div class="modal">
          <div class="modal-header">
            <div class="modal-title">添加管理员</div>
            <button class="modal-close" @click="showCreateModal=false">×</button>
          </div>
          <div class="form-group">
            <div class="form-label">用户名</div>
            <input class="form-input" v-model="newAdmin.username" placeholder="设置用户名（至少3字符）" />
          </div>
          <div class="form-group">
            <div class="form-label">密码</div>
            <input class="form-input" type="password" v-model="newAdmin.password" placeholder="设置密码（至少6字符）" />
          </div>
          <div class="form-group">
            <div class="form-label">角色</div>
            <select class="form-select" v-model="newAdmin.role">
              <option value="user_manager">普通管理员</option>
              <option value="super_admin">超级管理员</option>
            </select>
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary" @click="showCreateModal=false">取消</button>
            <button class="btn btn-primary" @click="createAdmin">创建</button>
          </div>
        </div>
      </div>

      <table class="data-table" v-if="users.length">
        <thead><tr>
          <th>用户名</th><th>角色</th><th>订阅状态</th><th>套餐</th><th>到期时间</th><th>注册时间</th><th>操作</th>
        </tr></thead>
        <tbody>
          <tr v-for="u in users" :key="u.id">
            <td>{{ u.username }}</td>
            <td><span class="badge" :class="u.role || 'user_manager'">{{ u.role === 'super_admin' ? '超级管理员' : '普通管理员' }}</span></td>
            <td><span class="badge" :class="u.subscription_status || 'active'">{{ u.subscription_status || '正常' }}</span></td>
            <td><span class="badge" :class="u.plan_id || 'free'">{{ u.plan_id || 'free' }}</span></td>
            <td>{{ u.expires_at ? new Date(u.expires_at*1000).toLocaleDateString() : '永久' }}</td>
            <td>{{ new Date(u.created_at*1000).toLocaleDateString() }}</td>
            <td>
              <button class="btn btn-secondary btn-sm" @click="openEdit(u)">编辑</button>
              <button class="btn btn-danger btn-sm" @click="toggleStatus(u)">{{ u.subscription_status === 'disabled' ? '启用' : '禁用' }}</button>
            </td>
          </tr>
        </tbody>
      </table>
      <div v-else class="empty">暂无用户</div>

      <div class="pagination" v-if="totalPages > 1">
        <button class="page-btn" @click="page--" :disabled="page<=1">‹</button>
        <button class="page-btn" v-for="p in totalPages" :key="p" :class="p===page?'active':''" @click="page=p;loadUsers()">{{ p }}</button>
        <button class="page-btn" @click="page++" :disabled="page>=totalPages">›</button>
      </div>

      <!-- 编辑弹窗 -->
      <div class="modal-overlay" v-if="showModal" @click.self="showModal=false">
        <div class="modal">
          <div class="modal-header">
            <div class="modal-title">编辑用户 #{{ editingUser?.id }}</div>
            <button class="modal-close" @click="showModal=false">×</button>
          </div>
          <div class="form-group" v-if="adminRole === 'super_admin'">
            <div class="form-label">管理员角色</div>
            <select class="form-select" v-model="editRole">
              <option value="user_manager">普通管理员</option>
              <option value="super_admin">超级管理员</option>
            </select>
          </div>
          <div class="form-group">
            <div class="form-label">订阅套餐</div>
            <select class="form-select" v-model="editPlan">
              <option value="free">免费版</option>
              <option value="pro_monthly">Pro 月付</option>
              <option value="pro_yearly">Pro 年付</option>
            </select>
          </div>
          <div class="form-group">
            <div class="form-label">到期时间（Unix时间戳，留空永久）</div>
            <input class="form-input" v-model="editExpires" placeholder="例: 1767081600 (2026-01-01)" />
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary" @click="showModal=false">取消</button>
            <button class="btn btn-primary" @click="saveUser">保存</button>
          </div>
        </div>
      </div>
    </div>
  `,
  setup() {
    const users = ref([])
    const loading = ref(false)
    const search = ref('')
    const filterStatus = ref('')
    const page = ref(1)
    const totalPages = ref(1)
    const showModal = ref(false)
    const showCreateModal = ref(false)
    const editingUser = ref(null)
    const editRole = ref('user_manager')
    const editPlan = ref('free')
    const editExpires = ref('')
    const newAdmin = ref({ username: '', password: '', role: 'user_manager' })
    const adminRole = computed(() => { const u = JSON.parse(localStorage.getItem('admin_user') || '{}'); return u.role || 'user_manager' })

    async function loadUsers() {
      loading.value = true
      try {
        const res = await adminFetch(API + '/admin/users', { params: { page: page.value, page_size: 20 } })
        if (res.data.code === 200) {
          users.value = res.data.data || []
          totalPages.value = Math.max(1, Math.ceil(users.value.length / 20))
        }
      } catch(e) { console.error(e) }
      finally { loading.value = false }
    }

    function openEdit(u) {
      editingUser.value = u
      editRole.value = u.role || 'user_manager'
      editPlan.value = u.plan_id || 'free'
      editExpires.value = u.expires_at || ''
      showModal.value = true
    }

    async function saveUser() {
      try {
        const expires = editExpires.value ? parseInt(editExpires.value) : null
        await adminFetch(API + '/admin/users/' + editingUser.value.id + '/subscription', {
          method: 'PUT',
          body: JSON.stringify({ plan_id: editPlan.value, expires_at: expires })
        })
        // 更新角色（仅 super_admin 可见此字段）
        if (editRole.value !== editingUser.value.role) {
          await adminFetch(API + '/admin/users/' + editingUser.value.id + '/role', {
            method: 'PUT',
            body: JSON.stringify({ role: editRole.value })
          })
        }
        showModal.value = false
        loadUsers()
      } catch(e) { console.error('保存失败', e) }
    }

    async function createAdmin() {
      if (!newAdmin.value.username || newAdmin.value.password.length < 6) {
        alert('用户名至少3字符，密码至少6字符')
        return
      }
      try {
        const res = await adminFetch(API + '/admin/users/create-admin', {
          method: 'POST',
          body: JSON.stringify(newAdmin.value)
        })
        const data = await res.json()
        if (data.code === 200) {
          showCreateModal.value = false
          newAdmin.value = { username: '', password: '', role: 'user_manager' }
          loadUsers()
        } else {
          alert(data.msg || '创建失败')
        }
      } catch(e) { alert('创建失败') }
    }

    async function toggleStatus(u) {
      const newStatus = u.subscription_status === 'disabled' ? 'active' : 'disabled'
      try {
        await adminFetch(API + '/admin/users/' + u.id + '/status', {
          method: 'PUT',
          body: JSON.stringify({ subscription_status: newStatus })
        })
        loadUsers()
      } catch(e) { console.error(e) }
    }

    let searchTimer = null
    function doSearch() {
      clearTimeout(searchTimer)
      searchTimer = setTimeout(loadUsers, 300)
    }

    onMounted(loadUsers)
    return { users, loading, search, filterStatus, page, totalPages, showModal, showCreateModal, editingUser, editRole, editPlan, editExpires, newAdmin, adminRole, loadUsers, openEdit, saveUser, createAdmin, toggleStatus, doSearch }
  }
}

        </tr></thead>
        <tbody>
          <tr v-for="o in orders" :key="o.order_id">
            <td style="font-family:monospace;font-size:11px">{{ o.order_id }}</td>
            <td style="font-size:11px">{{ o.user_id }}</td>
            <td>{{ o.plan_id }}</td>
            <td>¥{{ (o.amount/100).toFixed(2) }}</td>
            <td>{{ o.pay_method || '-' }}</td>
            <td><span class="badge" :class="o.status">{{ o.status }}</span></td>
            <td>{{ new Date(o.created_at*1000).toLocaleString() }}</td>
            <td>{{ o.paid_at ? new Date(o.paid_at*1000).toLocaleString() : '-' }}</td>
            <td>
              <button v-if="o.status==='pending'" class="btn btn-primary btn-sm" @click="confirmPaid(o)">确认支付</button>
              <button v-if="o.status==='paid'" class="btn btn-danger btn-sm" @click="refund(o)">退款</button>
            </td>
          </tr>
        </tbody>
      </table>
      <div v-else class="empty">暂无订单</div>

      <div class="pagination" v-if="totalPages > 1">
        <button class="page-btn" @click="page--;loadOrders()" :disabled="page<=1">‹</button>
        <button class="page-btn" v-for="p in totalPages" :key="p" :class="p===page?'active':''" @click="page=p;loadOrders()">{{ p }}</button>
        <button class="page-btn" @click="page++;loadOrders()" :disabled="page>=totalPages">›</button>
      </div>
    </div>
  `,
  setup() {
    const orders = ref([])
    const filterStatus = ref('')
    const page = ref(1)
    const totalPages = ref(1)

    async function loadOrders() {
      try {
        const params = { page: page.value, page_size: 20 }
        if (filterStatus.value) params.status = filterStatus.value
        const res = await adminFetch(API + '/admin/orders', { params })
        if (res.data.code === 200) {
          orders.value = res.data.data || []
          totalPages.value = Math.max(1, Math.ceil(orders.value.length / 20))
        }
      } catch(e) { console.error(e) }
    }

    async function confirmPaid(o) {
      if (!confirm('确认用户已支付？')) return
      try {
        await adminFetch(API + '/admin/orders/' + o.order_id, { status: 'paid' })
        loadOrders()
      } catch(e) { console.error(e) }
    }

    async function refund(o) {
      if (!confirm('确认退款？')) return
      try {
        await adminFetch(API + '/admin/orders/' + o.order_id, { status: 'refunded' })
        loadOrders()
      } catch(e) { console.error(e) }
    }

    onMounted(loadOrders)
    return { orders, filterStatus, page, totalPages, loadOrders, confirmPaid, refund }
  }
}

// Navigation guard for admin auth
router.beforeEach((to, from, next) => {
  if (to.meta.requiresAdmin) {
    const token = localStorage.getItem('admin_token')
    if (!token) {
      next('/login')
      return
    }
    const user = JSON.parse(localStorage.getItem('admin_user') || '{}')
    if (user.is_admin !== 1) {
      localStorage.removeItem('admin_token')
      localStorage.removeItem('admin_user')
      next('/login')
      return
    }
  }
  next()
})
createApp(App).use(router).mount('#app')
